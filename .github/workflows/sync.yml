name: sync-upstream

on:
  schedule:
    - cron: "17 6 * * 1"   # weekly, Monday 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Record current upstream version
        id: pre
        run: echo "version=$(cat .upstream-version)" >> "$GITHUB_OUTPUT"

      - name: Bump upstream if newer release exists
        id: bump
        run: |
          set -o pipefail
          python scripts/sync.py --bump-latest 2>&1 | tee sync.log
          echo "new_version=$(cat .upstream-version)" >> "$GITHUB_OUTPUT"

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Compose PR body
        if: steps.diff.outputs.changed == 'true'
        id: body
        env:
          PREV: ${{ steps.pre.outputs.version }}
          NEXT: ${{ steps.bump.outputs.new_version }}
        run: |
          {
            echo "body<<__EOF__"
            echo "Bumps \`followthemoney\` from \`${PREV}\` to \`${NEXT}\`."
            echo
            echo "## \`sync.py\` output"
            echo
            echo '```'
            cat sync.log
            echo '```'
            echo
            echo "If the output above includes a \`WARNING: N override(s) may be stale\`,"
            echo "re-apply the upstream changes by hand to the corresponding files under"
            echo "\`overrides/\`, then re-run \`make sync\` and push to this branch."
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Open PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto/upstream-${{ steps.bump.outputs.new_version }}
          base: main
          commit-message: "chore: bump followthemoney to ${{ steps.bump.outputs.new_version }}"
          title: "chore: bump followthemoney to ${{ steps.bump.outputs.new_version }}"
          body: ${{ steps.body.outputs.body }}
          labels: |
            upstream-sync
            automated
          add-paths: |
            .upstream-version
            .upstream-hashes.json
            schema/
