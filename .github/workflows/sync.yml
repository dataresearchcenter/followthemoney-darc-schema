name: sync-upstream

on:
  schedule:
    - cron: "17 6 * * 1"   # weekly, Monday 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Import latest upstream on vendor branch
        id: vendor
        run: |
          set -euo pipefail
          git checkout vendor
          before=$(git rev-parse HEAD)
          ./scripts/import-upstream.sh
          after=$(git rev-parse HEAD)
          tag=$(cat .upstream-version)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          if [ "$before" = "$after" ]; then
            echo "vendor branch unchanged; nothing to do"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push vendor branch and tag
        if: steps.vendor.outputs.changed == 'true'
        run: |
          git push origin vendor
          git push origin "refs/tags/upstream/${{ steps.vendor.outputs.tag }}"

      - name: Attempt merge into a new branch off main
        if: steps.vendor.outputs.changed == 'true'
        id: merge
        run: |
          set -uo pipefail
          tag="${{ steps.vendor.outputs.tag }}"
          branch="auto/upstream-$tag"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          git checkout -B "$branch" origin/main
          if git merge --no-edit vendor; then
            echo "clean=true" >> "$GITHUB_OUTPUT"
          else
            echo "clean=false" >> "$GITHUB_OUTPUT"
            git diff --name-only --diff-filter=U > /tmp/conflicts.txt
            git add -A
            git commit --no-verify -m "Merge upstream $tag (UNRESOLVED CONFLICTS)"
          fi
          git push -u origin "$branch"

      - name: Open PR (clean merge)
        if: steps.vendor.outputs.changed == 'true' && steps.merge.outputs.clean == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.merge.outputs.branch }}" \
            --title "Merge upstream ${{ steps.vendor.outputs.tag }}" \
            --body "Auto-merge succeeded. Vendor branch advanced to \`${{ steps.vendor.outputs.tag }}\` and merged cleanly into main. Review the diff and merge." \
            --label upstream-sync \
            --label automated

      - name: Open PR (conflicts — manual merge needed)
        if: steps.vendor.outputs.changed == 'true' && steps.merge.outputs.clean == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "Vendor branch advanced to \`${{ steps.vendor.outputs.tag }}\`, but merging into main produced conflicts."
            echo
            echo "The branch has been pushed **with conflict markers still in place** so you can resolve in-PR or locally."
            echo
            echo "## Conflicted files"
            echo
            echo '```'
            cat /tmp/conflicts.txt
            echo '```'
            echo
            echo "## How to resolve locally"
            echo
            echo '```bash'
            echo "git fetch origin ${{ steps.merge.outputs.branch }}"
            echo "git checkout ${{ steps.merge.outputs.branch }}"
            echo "# edit conflicted schema/*.yaml, remove <<<<<<< markers"
            echo "git add schema/"
            echo "git commit --amend --no-edit"
            echo "git push -f origin ${{ steps.merge.outputs.branch }}"
            echo '```'
          } > /tmp/pr-body.md
          gh pr create \
            --draft \
            --base main \
            --head "${{ steps.merge.outputs.branch }}" \
            --title "Merge upstream ${{ steps.vendor.outputs.tag }} — manual resolution needed" \
            --body-file /tmp/pr-body.md \
            --label upstream-sync \
            --label needs-manual-merge
