name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Verify schema/ matches overrides/ + upstream@pinned
        run: python scripts/sync.py --check

      - name: Run tests
        run: FTM_MODEL_PATH=$PWD/schema pytest -q
